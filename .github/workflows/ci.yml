name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  native:
    name: Zig native verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Zig
        env:
          ZIG_VERSION: "0.16.0"
          ZIG_TARBALL: "https://ziglang.org/download/0.16.0/zig-x86_64-linux-0.16.0.tar.xz"
          ZIG_SHASUM: "70e49664a74374b48b51e6f3fdfbf437f6395d42509050588bd49abe52ba3d00"
        run: |
          set -eu
          curl -fsSL "$ZIG_TARBALL" -o zig.tar.xz
          printf '%s  zig.tar.xz\n' "$ZIG_SHASUM" | sha256sum -c -
          mkdir -p "$RUNNER_TEMP/zig"
          tar -xf zig.tar.xz -C "$RUNNER_TEMP/zig" --strip-components=1
          echo "$RUNNER_TEMP/zig" >> "$GITHUB_PATH"
          "$RUNNER_TEMP/zig/zig" version

      - name: Format check
        run: zig build fmt

      - name: Compile check
        run: zig build check

      - name: Unit and functional tests
        run: zig build test

      - name: Docs generation
        run: zig build docs

      - name: Zero Python or JavaScript surface
        run: |
          set -eu
          forbidden="$(git ls-files | grep -E '(\.(py|pyi|ipynb|js|mjs|cjs|jsx|ts|tsx)$|(^|/)(package\.json|pyproject\.toml|setup\.py|requirements\.txt|tox\.ini|pytest\.ini|tsconfig\.json|bun\.lock|package-lock\.json|pnpm-lock\.yaml|yarn\.lock|pixi\.lock|uv\.lock)$)' || true)"
          test -z "$forbidden" || { printf '%s\n' "$forbidden"; exit 1; }
          ! grep -RInE '(^#!.*(python|node|deno|bun)|(^|[[:space:]])(python[0-9]?|node|deno|bun|npm|npx|yarn|pnpm)([[:space:]]+(-m|--test|run|install|add|exec|x|scripts?/|benchmarks?/)|$))' -- README.md docs .claude-plugin build.zig build.zig.zon src .gitleaks.toml

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
