name: Bug report
description: Something is broken or behaves differently from documentation.
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please give enough context that the bug
        is reproducible without back-and-forth.

  - type: textarea
    id: summary
    attributes:
      label: What happened
      description: One paragraph. State the observed behavior, not the expected.
      placeholder: When I do X, the system does Y.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Numbered steps. Include version / commit SHA.
      placeholder: |
        1. Run `zig build test`
        2. Set CORTEX_HOME to a temporary directory
        3. Call the native MCP tool or CLI command with the smallest input that reproduces the issue
        4. Observe Y
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        OS, Zig version, Crtx version / commit SHA, and any load-bearing
        environment variables.
      placeholder: |
        - OS: macOS 15.0
        - Zig: 0.16.0
        - Crtx version / commit: v4.0.0-native / abc1234
        - CORTEX_HOME: /tmp/crtx-repro
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Paste relevant error output. Use a fenced code block.
      render: shell
    validations:
      required: false

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: Your assessment — maintainer may reclassify.
      options:
        - Critical (data loss, RCE, crash on supported input)
        - High (core feature broken, no workaround)
        - Medium (feature broken, workaround exists)
        - Low (cosmetic, edge case)
    validations:
      required: true
