title = "Crtx native gitleaks config"

[extend]
useDefault = true

[[allowlists]]
description = "Historical non-real secret-shape fixtures removed from the current native tree; retained only so full-history scans can pass deterministically"
paths = [
  '''(^|/)\.claude/memory/pii-fixtures/tp-known-secrets\.txt$''',
]

[[allowlists]]
description = "Verified benchmark model-pin false positive; exact extracted secret only"
# Triage note: no credential rotation/revocation is attached to these entries
# because the findings are non-credential test fixtures plus a public model id.
# Real credential findings must be rotated or revoked before any allowlist entry.
regexes = [
  '''^claude-haiku-4-5-20251001$''',
]
